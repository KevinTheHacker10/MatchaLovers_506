name: matcha_lovers_506
description: "A sleek, touch-friendly POS app for \"Matcha Lovers 506,\" designed with a vibrant UI and robust Clean Architecture to manage orders and sales like a breeze."
publish_to: "none"
version: 1.0.0

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  go_router: ^16.2.0
  flutter_riverpod: ^3.0.0
  shared_preferences: ^2.0.0
  intl: 0.20.2
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/dreamflow_icon.jpg
  remove_alpha_ios: true
